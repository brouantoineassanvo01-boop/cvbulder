# Déploiement complet sur Render : BACKEND (Docker) + FRONTEND (site statique).
# 1) Pousse le repo sur GitHub.
# 2) Render → New + → Blueprint → sélectionne ce repo (il lit ce fichier).
# 3) Renseigne les secrets marqués "sync: false". Les URLs front/back se lient automatiquement.
services:
  # ---------- FRONTEND (React/Vite) : site statique ----------
  - type: web
    name: cvbuilder-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cvbuilder-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------- BACKEND (Django) : conteneur Docker ----------
  - type: web
    name: cvbuilder-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter           # WeasyPrint/LibreOffice nécessitent + de RAM que le plan free
    healthCheckPath: /api/templates/
    disk:
      name: media
      mountPath: /app/media   # photos & PDF générés (persistants)
      sizeGB: 1
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: cvbuilder-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: FRONTEND_URL
        fromService:
          type: web
          name: cvbuilder-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DJANGO_MEDIA_ROOT
        value: /app/media
      - key: DJANGO_SERVE_MEDIA
        value: "true"
      - key: PAYMENTS_ENFORCED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: cvbuilder-db
          property: connectionString
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_TPM_LIMIT
        value: "7600"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CURRENCY
        value: XOF

databases:
  - name: cvbuilder-db
    plan: basic-256mb
